<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>执业困境共享 · 私人执业咨询师成长研究</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d5a2d;
      --green-mid: #4a7a4a;
      --green-light: #e8f4e8;
      --green-border: #8aaa6a;
      --amber: #c8a840;
      --paper: #f5f3ee;
      --border: #d8d4c8;
      --font-serif: 'Georgia', serif;
      --font-mono: 'Courier New', monospace;
    }
    body { font-family: var(--font-serif); background: var(--paper); color: #1a1a14; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 3rem 1.25rem; }
    .label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--amber); margin-bottom: 0.75rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.875rem; color: #6a6a5a; margin-bottom: 2rem; line-height: 1.6; }

    /* Password gate */
    #gate-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .gate-card { max-width: 420px; width: 100%; padding: 2rem; background: white; border: 1px solid var(--border); border-top: 3px solid var(--green); border-radius: 2px; }
    .gate-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 0.5rem; }
    .gate-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .gate-desc { font-size: 0.8rem; color: #6a6a5a; margin-bottom: 1.5rem; line-height: 1.6; }
    .gate-input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: 2px; font-size: 0.875rem; outline: none; font-family: var(--font-mono); margin-bottom: 0.75rem; }
    .gate-input:focus { border-color: var(--green-border); }
    .gate-btn { width: 100%; padding: 0.7rem; background: var(--green); color: white; border: none; border-radius: 2px; font-family: var(--font-mono); font-size: 0.8rem; cursor: pointer; }
    .gate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .gate-error { font-size: 0.75rem; color: #c84040; font-family: var(--font-mono); margin-top: 0.5rem; display: none; }

    /* Forum content */
    #forum-page { display: none; }
    .post-count { font-family: var(--font-mono); font-size: 0.72rem; color: var(--green-mid); margin-bottom: 1.5rem; letter-spacing: 0.05em; }
    .post-card { background: white; border: 1px solid var(--border); border-left: 3px solid var(--green-border); border-radius: 2px; padding: 1.25rem; margin-bottom: 1rem; }
    .post-meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .post-num { font-family: var(--font-mono); font-size: 0.65rem; color: var(--amber); }
    .post-date { font-family: var(--font-mono); font-size: 0.62rem; color: #8a8a7a; }
    .post-body { font-size: 0.9rem; line-height: 1.8; color: #1a1a14; white-space: pre-wrap; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: #8a8a7a; font-family: var(--font-mono); font-size: 0.75rem; }
    .footer-note { text-align: center; font-family: var(--font-mono); font-size: 0.6rem; color: #8a8a7a; margin-top: 2rem; }

    #loading-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading-page"><div class="spinner"></div></div>

<!-- Password gate -->
<div id="gate-page" style="display:none">
  <div class="gate-card">
    <div class="gate-label">私人执业咨询师成长研究</div>
    <h2 class="gate-title">执业困境共享</h2>
    <p class="gate-desc">本页面收录了参与研究的咨询师自愿分享的执业困境描述（已匿名处理）。请输入访问密码继续。</p>
    <input id="pw-input" type="password" class="gate-input" placeholder="请输入访问密码" />
    <button id="pw-btn" class="gate-btn" onclick="verifyPassword()">进入</button>
    <p id="pw-error" class="gate-error">密码错误，请重试。</p>
  </div>
</div>

<!-- Forum content -->
<div id="forum-page">
  <div class="container">
    <div class="label">私人执业咨询师成长研究</div>
    <h1>执业困境共享</h1>
    <p class="subtitle">以下内容由参与研究的咨询师自愿分享，经匿名处理后展示。这些真实的执业困境描述，或许能让您感受到：您并不孤单。</p>
    <div id="post-count" class="post-count"></div>
    <div id="posts-container"></div>
    <p class="footer-note">所有内容均已匿名处理 · 分享者已知情同意 · 仅供已注册咨询师查阅</p>
  </div>
</div>

<script>
var API_BASE = 'https://therapisttool-anfd8v4p.manus.space/api/trpc';
var SESSION_KEY = 'forum_auth';

async function trpcMutate(procedure, input) {
  var res = await fetch(API_BASE + '/' + procedure, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'omit',
    body: JSON.stringify({ json: input }),
  });
  var json = await res.json();
  if (json.error) throw new Error(json.error.message || 'Request failed');
  return json.result && json.result.data && json.result.data.json !== undefined
    ? json.result.data.json : (json.result && json.result.data);
}

async function trpcQuery(procedure) {
  var res = await fetch(API_BASE + '/' + procedure + '?input=%7B%22json%22%3A%7B%7D%7D', {
    credentials: 'omit',
  });
  var json = await res.json();
  if (json.error) throw new Error(json.error.message || 'Request failed');
  return json.result && json.result.data && json.result.data.json !== undefined
    ? json.result.data.json : (json.result && json.result.data);
}

function formatDate(dateStr) {
  var d = new Date(dateStr);
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

async function loadPosts() {
  var container = document.getElementById('posts-container');
  var countEl = document.getElementById('post-count');
  try {
    var posts = await trpcQuery('forum.getPosts');
    if (!posts || posts.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无分享内容，敬请期待。</div>';
      countEl.textContent = '共 0 篇分享';
      return;
    }
    countEl.textContent = '共 ' + posts.length + ' 篇分享';
    container.innerHTML = posts.map(function(p, i) {
      return '<div class="post-card">' +
        '<div class="post-meta">' +
          '<span class="post-num">#' + String(i + 1).padStart(2, '0') + '</span>' +
          '<span class="post-date">' + formatDate(p.submittedAt) + '</span>' +
          '<span class="post-date">' + p.wordCount + ' 字</span>' +
        '</div>' +
        '<p class="post-body">' + escapeHtml(p.answer) + '</p>' +
      '</div>';
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="empty-state">加载失败，请刷新重试。</div>';
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function verifyPassword() {
  var pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  var btn = document.getElementById('pw-btn');
  btn.disabled = true;
  btn.textContent = '验证中……';
  document.getElementById('pw-error').style.display = 'none';
  try {
    var result = await trpcMutate('forum.verifyPassword', { password: pw });
    if (result && result.valid) {
      sessionStorage.setItem(SESSION_KEY, '1');
      showForum();
    } else {
      document.getElementById('pw-error').style.display = 'block';
      btn.disabled = false;
      btn.textContent = '进入';
    }
  } catch(e) {
    document.getElementById('pw-error').textContent = '验证失败，请重试。';
    document.getElementById('pw-error').style.display = 'block';
    btn.disabled = false;
    btn.textContent = '进入';
  }
}

function showForum() {
  document.getElementById('gate-page').style.display = 'none';
  document.getElementById('forum-page').style.display = 'block';
  loadPosts();
}

// Allow Enter key in password input
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('pw-input');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verifyPassword();
    });
  }
});

// Init
document.getElementById('loading-page').style.display = 'none';
if (sessionStorage.getItem(SESSION_KEY)) {
  showForum();
} else {
  document.getElementById('gate-page').style.display = 'flex';
}
</script>
</body>
</html>
